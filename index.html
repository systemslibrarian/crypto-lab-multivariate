<!doctype html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var prefersDark =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = saved || (prefersDark ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b7fab" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#12101a" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    />
    <meta

      content="Interactive post-quantum multivariate cryptography lab. Sign messages with Oil-and-Vinegar (UOV) in your browser, watch the trapdoor turn a hard nonlinear problem into a linear solve, and see how Rainbow was broken in 2022."

    <meta
